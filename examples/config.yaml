###############################################################################
#  Example Ludusavi config.yaml
#  Designed for emulator setups using platform-level custom entries.
#  Each entry backs up ALL saves/states for a given platform.
#
#  QUICK START:
#  1. Place this file at: %APPDATA%\ludusavi\config.yaml
#  2. Run: .\scripts\discover-paths.ps1 -ConfigPath %APPDATA%\ludusavi\config.yaml
#     (auto-detects your emulator paths and fills in the customGames section)
#  3. Set up rclone if you want cloud sync (see cloud section below)
###############################################################################

---
runtime:
  threads: ~
  networkSecurity: safe
release:
  check: true
manifest:
  enable: true
language: en-US
theme: dark

###############################################################################
#  Roots: tell Ludusavi where to find PC game installations.
#  Add your Steam/Epic/GOG/WinStore library paths here.
###############################################################################
roots:
  - store: microsoft
    path: "C:/Program Files/WindowsApps"
  - store: ea
    path: "C:/Program Files/EA Games"
redirects: []

###############################################################################
#  Backup settings
###############################################################################
backup:
  path: "%USERPROFILE%/ludusavi-backup"
  ignoredGames: []
  filter:
    excludeStoreScreenshots: false
    cloud:
      exclude: false
      epic: false
      gog: false
      origin: false
      steam: false
      uplay: false
    ignoredPaths: []
    ignoredRegistry: []
  toggledPaths: {}
  toggledRegistry: {}
  sort:
    key: status
    reversed: false
  retention:
    full: 1
    differential: 0
  format:
    chosen: zip
    zip:
      compression: zstd
    compression:
      deflate:
        level: 6
      bzip2:
        level: 6
      zstd:
        level: 19
  onlyConstructive: true

###############################################################################
#  Restore settings (usually same path as backup)
###############################################################################
restore:
  path: "%USERPROFILE%/ludusavi-backup"
  ignoredGames: []
  toggledPaths: {}
  toggledRegistry: {}
  sort:
    key: status
    reversed: false
  reverseRedirects: false

###############################################################################
#  Scan display
###############################################################################
scan:
  showDeselectedGames: true
  showUnchangedGames: true
  showUnscannedGames: true

###############################################################################
#  Cloud Sync (optional - requires rclone)
#  =======================================
#  Ludusavi uses rclone to sync your backup folder to cloud storage.
#  Supported providers: Google Drive, Dropbox, OneDrive, S3, FTP, etc.
#
#  SETUP STEPS:
#  1. Install rclone:  https://rclone.org/downloads/
#     - Or via scoop:  scoop install rclone
#
#  2. Configure a remote. Example for Google Drive:
#        rclone config
#        n) New remote
#        name> gdrive
#        type> drive
#        ... follow the prompts to authenticate ...
#
#     For other providers, see: https://rclone.org/docs/
#
#  3. Test the remote:
#        rclone ls gdrive:
#
#  4. Set the 'remote' field below to your remote name:
#        remote: "gdrive:"     (the colon is required)
#
#  5. Verify with Ludusavi (first sync may take a while):
#        ludusavi cloud sync
###############################################################################
cloud:
  remote: ~             # <-- SET THIS: "gdrive:" or "dropbox:" etc.
  path: ludusavi-backup
  synchronize: true

###############################################################################
#  Third-party tools
###############################################################################
apps:
  # rclone.exe location. Defaults to PATH if not set.
  # Find yours with:  where.exe rclone
  rclone:
    path: "rclone.exe"
    arguments: "--fast-list --ignore-checksum"

###############################################################################
#  Custom games (emulator platform entries)
#  ========================================
#  Each entry backs up save files and save states for a console platform.
#
#  Name these entries to match your LaunchBox platform names exactly.
#  The plugin auto-detects non-PC games and backs up by platform name.
#
#  TIP: Use the discover-paths.ps1 script to auto-generate these entries:
#       .\scripts\discover-paths.ps1 -ConfigPath %APPDATA%\ludusavi\config.yaml
#
#  Each entry uses:
#    - files:     paths to save data (use ** for recursive glob)
#    - registry:  Windows registry keys (rarely needed for emulators)
#    - installDir: game install folders (not used for platform entries)
###############################################################################
customGames:
  # --- Nintendo ---
  - name: Nintendo Game Boy Advance
    integration: override
    files:
      - "%RETROARCH%\saves\mGBA\**"
      - "%RETROARCH%\states\mGBA\**"
    registry: []
    installDir: []
    winePrefix: []

  - name: Nintendo Game Boy
    integration: override
    files:
      - "%RETROARCH%\saves\SameBoy\**"
      - "%RETROARCH%\states\SameBoy\**"
    registry: []
    installDir: []
    winePrefix: []

  - name: Nintendo Game Boy Color
