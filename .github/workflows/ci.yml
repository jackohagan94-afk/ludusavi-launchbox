name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: dotnet build src/LudusaviLaunchBox.csproj -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LudusaviLaunchBox
          path: src/bin/Release/net9.0-windows/LudusaviLaunchBox.dll
