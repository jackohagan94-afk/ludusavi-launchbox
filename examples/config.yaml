###############################################################################
#  Example Ludusavi config.yaml
#  Designed for emulator setups using platform-level custom entries.
#  Each entry backs up ALL saves/states for a given platform.
#
#  Place this in:  %APPDATA%/ludusavi/config.yaml
#  (usually C:\Users\<You>\AppData\Roaming\ludusavi\config.yaml)
###############################################################################

---
runtime:
  threads: ~
  networkSecurity: safe
release:
  check: true
manifest:
  enable: true
language: en-US
theme: dark

###############################################################################
#  Roots: tell Ludusavi where to find PC game installations.
#  Add your Steam/Epic/GOG/WinStore library paths here.
###############################################################################
roots:
  - store: microsoft
    path: "C:/Program Files/WindowsApps"
  - store: ea
    path: "C:/Program Files/EA Games"
redirects: []

###############################################################################
#  Backup settings
###############################################################################
backup:
  # Where backup files are stored (also used as default restore path)
  path: "C:/Users/<YourName>/ludusavi-backup"
  ignoredGames: []
  filter:
    excludeStoreScreenshots: false
    cloud:
      exclude: false
      epic: false
      gog: false
      origin: false
      steam: false
      uplay: false
    ignoredPaths: []
    ignoredRegistry: []
  toggledPaths: {}
  toggledRegistry: {}
  sort:
    key: status
    reversed: false
  retention:
    full: 1           # Keep 1 full backup per game
    differential: 0   # No differential backups
  format:
    chosen: zip        # Store backups as zip files
    zip:
      compression: zstd
    compression:
      deflate:
        level: 6
      bzip2:
        level: 6
      zstd:
        level: 19      # Maximum compression
  onlyConstructive: true

###############################################################################
#  Restore settings (usually same path as backup)
###############################################################################
restore:
  path: "C:/Users/<YourName>/ludusavi-backup"
  ignoredGames: []
  toggledPaths: {}
  toggledRegistry: {}
  sort:
    key: status
    reversed: false
  reverseRedirects: false

###############################################################################
#  Scan display
###############################################################################
scan:
  showDeselectedGames: true
  showUnchangedGames: true
  showUnscannedGames: true

###############################################################################
#  Cloud sync (requires rclone) - optional
#  Set 'remote' to your rclone remote name (e.g. "gdrive:") to enable.
###############################################################################
cloud:
  remote: ~                                  # Set to e.g. "gdrive:" to enable
  path: ludusavi-backup
  synchronize: true

###############################################################################
#  Third-party tools
###############################################################################
apps:
  # rclone.exe path (required only if cloud sync enabled)
  rclone:
    path: "C:\\Tools\\rclone\\rclone.exe"
    arguments: "--fast-list --ignore-checksum"

###############################################################################
#  Custom games (emulator platform entries)
#  Each entry backs up save files and save states for a console platform.
#  Glob patterns (**) capture all save files regardless of game.
#
#  TIP: Name these entries to match your LaunchBox platform names exactly.
#       The plugin will auto-detect non-PC games and back up by platform.
###############################################################################
customGames:
