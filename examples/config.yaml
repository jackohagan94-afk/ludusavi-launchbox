###############################################################################
#  VARIABLE REFERENCE
#  ==================
#  These placeholders are expanded by discover-paths.ps1 when it writes
#  your config. Ludusavi itself does NOT expand environment variables in
#  these fields - the script replaces them with actual paths.
#
#    %APPDATA%     C:\Users\<You>\AppData\Roaming
#    %USERPROFILE% C:\Users\<You>
#    %RETROARCH%   Auto-detected RetroArch folder
#    %EMUDIR%      Your Emulators folder (%USERPROFILE%\Documents\Emulation\Emulators)
###############################################################################
